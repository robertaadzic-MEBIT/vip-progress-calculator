<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Progress Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f212e;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1a2c38;
      padding: 25px;
      border-radius: 10px;
      width: 350px;
    }

    h1 {
      text-align: center;
      color: #00e701;
    }

    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #00e701;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>VIP Calculator</h1>

    <select id="vipLevel">
      <option value="nonvip">Non-VIP</option>
      <option value="bronze">Bronze</option>
      <option value="prata">Prata</option>
      <option value="ouro">Ouro</option>
      <option value="platina1">Platina I</option>
      <option value="platina2">Platina II</option>
      <option value="platina3">Platina III</option>
      <option value="platina4">Platina IV</option>
      <option value="platina5">Platina V</option>
      <option value="platina6">Platina VI</option>
      <option value="diamante1">Diamante I</option>
      <option value="diamante2">Diamante II</option>
      <option value="diamante3">Diamante III</option>
      <option value="diamante4">Diamante IV</option>
      <option value="diamante5">Diamante V</option>
      <option value="obsidiana">Obsidiana</option>
    </select>

    <input type="number" id="progress" placeholder="Progresso % (ex: 70)">

    <button onclick="calculate()">Calcular</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    const vipTargets = {
      bronze: 60000,
      prata: 300000,
      ouro: 600000,
      platina1: 1500000,
      platina2: 3000000,
      platina3: 6000000,
      platina4: 15000000,
      platina5: 32500000,
      platina6: 60000000,
      diamante1: 150000000,
      diamante2: 300000000,
      diamante3: 600000000,
      diamante4: 1500000000,
      diamante5: 3000000000,
      obsidiana: 6000000000
    };

    const vipNames = {
      nonvip: "Non-VIP",
      bronze: "Bronze",
      prata: "Prata",
      ouro: "Ouro",
      platina1: "Platina I",
      platina2: "Platina II",
      platina3: "Platina III",
      platina4: "Platina IV",
      platina5: "Platina V",
      platina6: "Platina VI",
      diamante1: "Diamante I",
      diamante2: "Diamante II",
      diamante3: "Diamante III",
      diamante4: "Diamante IV",
      diamante5: "Diamante V",
      obsidiana: "Obsidiana"
    };

    const nextLevels = {
      nonvip: "bronze",
      bronze: "prata",
      prata: "ouro",
      ouro: "platina1",
      platina1: "platina2",
      platina2: "platina3",
      platina3: "platina4",
      platina4: "platina5",
      platina5: "platina6",
      platina6: "diamante1",
      diamante1: "diamante2",
      diamante2: "diamante3",
      diamante3: "diamante4",
      diamante4: "diamante5",
      diamante5: "obsidiana"
    };

    function calculate() {
     const currentLevel = document.getElementById("vipLevel").value;
    const progress = Number(document.getElementById("progress").value);

    if (progress < 0 || progress > 100 || isNaN(progress)) {
      document.getElementById("result").innerText = "Digite um valor entre 0 e 100";
      return;
    }

    const nextLevel = nextLevels[currentLevel];

    if (!nextLevel) {
      document.getElementById("result").innerHTML =
        "Você já está no nível máximo: <strong>" + vipNames[currentLevel] + "</strong>.";
      return;
    }

    const target = vipTargets[nextLevel];
    const remaining = target * ((100 - progress) / 100);

    document.getElementById("result").innerHTML =
      "Você está atualmente no nível <strong>" + vipNames[currentLevel] + "</strong>.<br><br>" +
      "O seu próximo nível é <strong>" + vipNames[nextLevel] + "</strong>.<br><br>" +
      "Para alcançar esse nível, ainda falta apostar:<br>" +
      "<strong>R$ " + remaining.toLocaleString("pt-BR") + "</strong>.<br><br>" +
      "Lembre-se: apostas em esportes contam 3 vezes mais para o progresso VIP, " +
      "então apostando em esportes você avança para o próximo nível 3 vezes mais rápido.";
    }
  </script>
</body>
</html>
