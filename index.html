<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Progress Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f212e;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background: #1a2c38;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      color: #00e701;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    select, input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #00e701;
      color: #0f212e;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00c901;
    }

    .result {
      margin-top: 25px;
      background: #0f212e;
      padding: 15px;
      border-radius: 8px;
      font-size: 18px;
      text-align: center;
      line-height: 1.5;
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #b1bad3;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>VIP Progress Calculator</h1>

    <label for="vipLevel">Nível VIP atual:</label>
    <select id="vipLevel">
      <option value="bronze">Bronze</option>
      <option value="prata">Prata</option>
      <option value="ouro">Ouro</option>
      <option value="platina1">Platina I</option>
      <option value="platina2">Platina II</option>
      <option value="platina3">Platina III</option>
      <option value="platina4">Platina IV</option>
      <option value="platina5">Platina V</option>
      <option value="platina6">Platina VI</option>
      <option value="diamante1">Diamante I</option>
      <option value="diamante2">Diamante II</option>
      <option value="diamante3">Diamante III</option>
      <option value="diamante4">Diamante IV</option>
      <option value="diamante5">Diamante V</option>
      <option value="obsidiana">Obsidiana</option>
    </select>

    <label for="progress">Progresso atual (%):</label>
    <input type="number" id="progress" placeholder="Ex: 72" min="0" max="100">

    <button onclick="calculate()">Calcular</button>

    <div class="result" id="result">
      Insira os dados acima para calcular.
    </div>

    <div class="note">
      O cálculo considera que a porcentagem informada é o progresso até o próximo nível VIP.
    </div>
  </div>

  <script>
    const vipTargets = {
      bronze: 60000,
      prata: 300000,
      ouro: 600000,
      platina1: 1500000,
      platina2: 3000000,
      platina3: 6000000,
      platina4: 15000000,
      platina5: 32500000,
      platina6: 60000000,
      diamante1: 150000000,
      diamante2: 300000000,
      diamante3: 600000000,
      diamante4: 1500000000,
      diamante5: 3000000000,
      obsidiana: 6000000000
    };

    const vipNames = {
      bronze: "Bronze",
      prata: "Prata",
      ouro: "Ouro",
      platina1: "Platina I",
      platina2: "Platina II",
      platina3: "Platina III",
      platina4: "Platina IV",
      platina5: "Platina V",
      platina6: "Platina VI",
      diamante1: "Diamante I",
      diamante2: "Diamante II",
      diamante3: "Diamante III",
      diamante4: "Diamante IV",
      diamante5: "Diamante V",
      obsidiana: "Obsidiana"
    };

    function formatBRL(value) {
      return value.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function calculate() {
      const level = document.getElementById("vipLevel").value;
      const progress = Number(document.getElementById("progress").value);
      const resultBox = document.getElementById("result");

      if (progress < 0 || progress > 100 || isNaN(progress)) {
        resultBox.innerHTML = "Por favor, insira um progresso válido entre 0 e 100.";
        return;
      }

      const target = vipTargets[level];
      const remaining = target * ((100 - progress) / 100);

      resultBox.innerHTML =
        "<strong>Nível selecionado:</strong> " + vipNames[level] + "<br>" +
        "<strong>Meta total:</strong> " + formatBRL(target) + "<br>" +
        "<strong>Progresso atual:</strong> " + progress + "%<br><br>" +
        "<strong>Falta apostar:</strong><br>" + formatBRL(remaining);
    }
  </script>
</body>
</html>
